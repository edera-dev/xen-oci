name: release
on:
  workflow_dispatch:
  schedule:
  - cron: "0 0 * * 1"
permissions:
  contents: read
  packages: write
  id-token: write
jobs:
  build:
    runs-on: edera-large
    strategy:
      fail-fast: false
      matrix:
        release:
        - 4.19.0
        - 4.19.1
        - 4.20.0
        - 4.20.1
        - 4.21
        component:
        - xen
        - oxenstored
        - qemu-xen
    name: oci build ${{ matrix.component }}-${{ matrix.release }}
    steps:
    - uses: step-security/harden-runner@95d9a5deda9de15063e7595e9719c11c38c90ae2 # v2.13.2
      with:
        egress-policy: audit
    - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      with:
        submodules: recursive
    - uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0
    - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
    - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1
    - uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

      # these are all built against upstream RELEASE-X.X.X branches, and patch them.
      # Starting with 4.21, we build against `edera/X.X.X` branches, which integrated patches.
    - name: Determine XEN_BRANCH
      id: branch
      run: |
        VERSION="${{ matrix.release }}"
        MAJOR_MINOR=$(echo "$VERSION" | cut -d. -f1,2)

        if [ "$(printf '%s\n' "4.20" "$MAJOR_MINOR" | sort -V | head -n1)" = "$MAJOR_MINOR" ] && [ "$MAJOR_MINOR" != "4.21" ]; then
          echo "name=RELEASE-${VERSION}" >> $GITHUB_OUTPUT
        else
          echo "name=edera/${VERSION}" >> $GITHUB_OUTPUT
        fi

    - name: configure sccache
      id: sccache
      uses: edera-dev/actions/configure-azure-sccache@f92635e9fe8739c2b8a78fa87e9c8567bfa81b9c # v0.0.15
      with:
        connection-string-rw: ${{ secrets.SCCACHE_AZURE_CONNECTION_STRING }}
        connection-string-ro: ${{ secrets.SCCACHE_AZURE_CONNECTION_STRING_RO }}
        key-prefix: xen
    - uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
      id: push-step
      env:
        SCCACHE_AZURE_CONNECTION_STRING: ${{ steps.sccache.outputs.connection-string }}
      with:
        file: ./Dockerfile.${{ matrix.component }}
        platforms: linux/amd64,linux/aarch64
        tags: ghcr.io/edera-dev/${{ matrix.component }}:${{ matrix.release }}
        build-args: |
          XEN_VERSION=${{ matrix.release }}
          XEN_BRANCH=${{ steps.branch.outputs.name }}
          SCCACHE_AZURE_RW_MODE=${{ steps.sccache.outputs.rw-mode }}
        secret-envs: |
          sccache_conn=SCCACHE_AZURE_CONNECTION_STRING
        push: true
    - name: Sign the image
      env:
        DIGEST: ${{ steps.push-step.outputs.digest }}
        TAGS: ghcr.io/edera-dev/${{ matrix.component }}:${{ matrix.release }}
        COSIGN_EXPERIMENTAL: "true"
      run: cosign sign --yes "${TAGS}@${DIGEST}"

    - name: Build `build` stage for SBOM scan
      uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
      env:
        SCCACHE_AZURE_CONNECTION_STRING: ${{ steps.sccache.outputs.connection-string }}
      with:
        file: ./Dockerfile.${{ matrix.component }}
        target: build
        platforms: linux/amd64
        # build-args must match the main build exactly, or the ARG mismatch
        # busts the layer cache and this rebuilds the world.
        build-args: |
          XEN_VERSION=${{ matrix.release }}
          XEN_BRANCH=${{ steps.branch.outputs.name }}
          SCCACHE_AZURE_RW_MODE=${{ steps.sccache.outputs.rw-mode }}
        secret-envs: |
          sccache_conn=SCCACHE_AZURE_CONNECTION_STRING
        load: true
        tags: sbom-scan-${{ matrix.component }}:latest
    - uses: anchore/sbom-action/download-syft@36a5fde73e0fcb1d1e70be9ad66b4724e783bda7
      id: syft
    # Emit a curated CycloneDX SBOM: source, applied patches, 
    # and qemu-xen's apk sysroot
    - name: Generate and attest CycloneDX SBOM
      env:
        DIGEST: ${{ steps.push-step.outputs.digest }}
        TAGS: ghcr.io/edera-dev/${{ matrix.component }}:${{ matrix.release }}
        SYFT_CMD: ${{ steps.syft.outputs.cmd }}
        COMPONENT: ${{ matrix.component }}
        XEN_VERSION: ${{ matrix.release }}
        XEN_BRANCH: ${{ steps.branch.outputs.name }}
        COSIGN_EXPERIMENTAL: "true"
      run: |
        set -euo pipefail
        scan="sbom-scan-${COMPONENT}:latest"

        XEN_COMMIT="$(docker run --rm "${scan}" git -C /usr/src/xen rev-parse HEAD)"
        export XEN_COMMIT
        if [ "${COMPONENT}" = "qemu-xen" ]; then
          QEMU_COMMIT="$(docker run --rm "${scan}" git -C /usr/src/qemu-xen rev-parse HEAD)"
          LIBUCONTEXT_COMMIT="$(docker run --rm "${scan}" git -C /usr/src/libucontext rev-parse HEAD)"
          LIBUCONTEXT_VERSION="$(docker run --rm "${scan}" printenv LIBUCONTEXT_VERSION)"
          export QEMU_COMMIT LIBUCONTEXT_COMMIT LIBUCONTEXT_VERSION
        fi

        # Catalog the runtime apk packages that actually ship.
        "${SYFT_CMD}" "registry:${TAGS}@${DIGEST}" \
          --platform linux/amd64 \
          --override-default-catalogers apk-db-cataloger \
          --select-catalogers "-file" \
          -o "cyclonedx-json=${COMPONENT}.syft.cdx.json"

        # Merge curated source(s) + patches + scanned packages into one SBOM.
        PKG_SBOM="${COMPONENT}.syft.cdx.json" python3 generate-sbom.py

        jq -e '.bomFormat == "CycloneDX" and ((.components // []) | length > 0)' \
          "${COMPONENT}.cdx.json" >/dev/null \
          || { echo "::error::SBOM for ${COMPONENT} is empty or invalid"; exit 1; }
        jq '{component: env.COMPONENT, components: (.components | length)}' \
          "${COMPONENT}.cdx.json"

        cosign attest --yes --type cyclonedx \
          --predicate "${COMPONENT}.cdx.json" \
          "${TAGS}@${DIGEST}"
