name: nightly
on:
  workflow_dispatch:
  schedule:
  - cron: "0 0 * * 1"
permissions:
  contents: read
  packages: write
  id-token: write
jobs:
  build:
    runs-on: edera-large
    strategy:
      fail-fast: false
      matrix:
        component:
        - xen
        - qemu-xen
    name: oci build ${{ matrix.component }}
    steps:
    - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
      with:
        egress-policy: audit
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        submodules: recursive
    - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
    - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
    - name: allow unprivileged user namespaces
      # Ubuntu 24.04 runner images restrict unprivileged user namespace
      # creation via AppArmor; rootless buildkitd requires it.
      run: |
        if [ "$(sudo sysctl -n kernel.apparmor_restrict_unprivileged_userns 2>/dev/null)" = "1" ]; then
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
        fi
    - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      # Rootless buildkit: RUN steps execute as an unprivileged user inside a
      # user namespace (still uid 0 in-image, so artifact ownership does not
      # change). Among other things this makes /dev/null a host bind mount
      # the build cannot delete or replace - a build once smuggled an ELF
      # object into /dev/null and poisoned every compiler probe that read it
      # afterwards. (Bump the image pin manually: dependabot does not track
      # driver-opts images.)
      with:
        driver-opts: image=moby/buildkit:v0.31.1-rootless@sha256:946cf909534b789c9b84af75e6d4f8cb23c3b9cb387daec5ba0f4878a3e4647c
        buildkitd-flags: --oci-worker-no-process-sandbox
    - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: configure sccache
      id: sccache
      uses: edera-dev/actions/configure-azure-sccache@f92635e9fe8739c2b8a78fa87e9c8567bfa81b9c # v0.0.15
      with:
        connection-string-rw: ${{ secrets.SCCACHE_AZURE_CONNECTION_STRING }}
        connection-string-ro: ${{ secrets.SCCACHE_AZURE_CONNECTION_STRING_RO }}
        key-prefix: xen
    - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      id: push-step
      env:
        SCCACHE_AZURE_CONNECTION_STRING: ${{ steps.sccache.outputs.connection-string }}
      with:
        file: ./Dockerfile.${{ matrix.component }}
        platforms: linux/amd64,linux/aarch64
        tags: ghcr.io/edera-dev/${{ matrix.component }}:nightly
        build-args: |
          XEN_VERSION=4.21
          SCCACHE_AZURE_RW_MODE=${{ steps.sccache.outputs.rw-mode }}
        secret-envs: |
          sccache_conn=SCCACHE_AZURE_CONNECTION_STRING
        push: true
    - name: Sign the image
      env:
        DIGEST: ${{ steps.push-step.outputs.digest }}
        TAGS: ghcr.io/edera-dev/${{ matrix.component }}:nightly
        COSIGN_EXPERIMENTAL: "true"
      run: cosign sign --yes "${TAGS}@${DIGEST}"

    - name: Build `build` stage for SBOM scan
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      env:
        SCCACHE_AZURE_CONNECTION_STRING: ${{ steps.sccache.outputs.connection-string }}
      with:
        file: ./Dockerfile.${{ matrix.component }}
        target: build
        # single platform to only read source/commit metadata once, still sbom's all arches
        platforms: linux/amd64
        # build-args must match the main build exactly, or the ARG mismatch
        # busts the layer cache and this rebuilds the world.
        build-args: |
          XEN_VERSION=4.21
          SCCACHE_AZURE_RW_MODE=${{ steps.sccache.outputs.rw-mode }}
        secret-envs: |
          sccache_conn=SCCACHE_AZURE_CONNECTION_STRING
        load: true
        tags: sbom-scan-${{ matrix.component }}:latest
    - uses: anchore/sbom-action/download-syft@26ca99d710488389d655c50441b85fbf22179c0b
      id: syft
    # Build CycloneDX SBOM without build dependencies
    - name: Generate and attest CycloneDX SBOM
      env:
        DIGEST: ${{ steps.push-step.outputs.digest }}
        TAGS: ghcr.io/edera-dev/${{ matrix.component }}:nightly
        SYFT_CMD: ${{ steps.syft.outputs.cmd }}
        COMPONENT: ${{ matrix.component }}
        XEN_VERSION: "4.21"
        COSIGN_EXPERIMENTAL: "true"
      run: |
        set -euo pipefail
        scan="sbom-scan-${COMPONENT}:latest"

        # Resolve the exact source commit(s) the build checked out
        XEN_COMMIT="$(docker run --rm "${scan}" git -C /usr/src/xen rev-parse HEAD)"
        export XEN_COMMIT
        if [ "${COMPONENT}" = "qemu-xen" ]; then
          QEMU_COMMIT="$(docker run --rm "${scan}" git -C /usr/src/qemu-xen rev-parse HEAD)"
          LIBUCONTEXT_COMMIT="$(docker run --rm "${scan}" git -C /usr/src/libucontext rev-parse HEAD)"
          LIBUCONTEXT_VERSION="$(docker run --rm "${scan}" printenv LIBUCONTEXT_VERSION)"
          export QEMU_COMMIT LIBUCONTEXT_COMMIT LIBUCONTEXT_VERSION
        fi

        # Catalog the runtime apk packages that actually ship
        "${SYFT_CMD}" "registry:${TAGS}@${DIGEST}" \
          --platform linux/amd64 \
          --override-default-catalogers apk-db-cataloger \
          --select-catalogers "-file" \
          -o "cyclonedx-json=${COMPONENT}.syft.cdx.json"

        # Merge curated source(s) + patches + scanned packages into one SBOM.
        PKG_SBOM="${COMPONENT}.syft.cdx.json" python3 generate-sbom.py

        jq -e '.bomFormat == "CycloneDX" and ((.components // []) | length > 0)' \
          "${COMPONENT}.cdx.json" >/dev/null \
          || { echo "::error::SBOM for ${COMPONENT} is empty or invalid"; exit 1; }
        jq '{component: env.COMPONENT, components: (.components | length)}' \
          "${COMPONENT}.cdx.json"

        cosign attest --yes --type cyclonedx \
          --predicate "${COMPONENT}.cdx.json" \
          "${TAGS}@${DIGEST}"
